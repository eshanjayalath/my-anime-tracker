name: Auto Update Schedule Data

on:
  schedule:
    - cron: '0 */12 * * *' # Automatically runs every 12 hours
  workflow_dispatch: # Allows manual trigger button in GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Fetch Script
      run: python fetch_schedule.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add schedule.json
        git commit -m "Automated schedule update [skip ci]" || exit 0
        git push
